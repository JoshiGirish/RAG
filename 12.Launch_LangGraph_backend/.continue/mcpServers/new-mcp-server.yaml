name: New MCP server
version: 0.0.1
schema: v1
mcpServers:
  - name: filesystem
    command: npx
    args:
      - -y
      - "@modelcontextprotocol/server-filesystem"
      - .

  - name: memory
    command: npx
    args:
      - -y
      - "@modelcontextprotocol/server-memory"

  - name: fetch
    command: npx
    args:
      - -y
      - "@modelcontextprotocol/server-fetch"