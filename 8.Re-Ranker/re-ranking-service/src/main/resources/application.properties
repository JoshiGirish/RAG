# Application Configuration
quarkus.application.name=rag-re-ranker

# Server Configuration
quarkus.http.port=8080

# Logging
quarkus.log.level=INFO
quarkus.log.category."com.example".level=DEBUG

# Re-ranker Configuration
re-ranker.top-k=5
re-ranker.max-results=10

# Cross-encoder settings
re-ranker.cross-encoder.model=msmarco-MiniLM-L-6-v2
re-ranker.cross-encoder.max-tokens=512

# Qdrant connection (for vector search integration)
qdrant.url=http://localhost:6333
qdrant.collection=rag-documents